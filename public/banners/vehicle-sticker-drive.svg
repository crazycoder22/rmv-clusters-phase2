<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Security-drive gradient: deep indigo → emerald (matches /stickers page) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="55%" stop-color="#1e3a5f" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
    <radialGradient id="spot" cx="25%" cy="20%" r="80%">
      <stop offset="0%" stop-color="rgba(167, 243, 208, 0.35)" />
      <stop offset="100%" stop-color="rgba(167, 243, 208, 0)" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="12" />
  <rect width="200" height="200" fill="url(#spot)" rx="12" />

  <!-- Big car icon -->
  <text
    x="58"
    y="118"
    text-anchor="middle"
    font-family="Helvetica, Arial, sans-serif"
    font-size="86"
    filter="url(#glow)"
  >🚗</text>

  <!-- Headline -->
  <text
    x="195"
    y="62"
    text-anchor="end"
    font-family="Helvetica, Arial, sans-serif"
    font-size="20"
    font-weight="800"
    fill="#ffffff"
    letter-spacing="0.2"
  >Get your sticker</text>

  <!-- Subline -->
  <text
    x="195"
    y="86"
    text-anchor="end"
    font-family="Helvetica, Arial, sans-serif"
    font-size="13"
    fill="rgba(255,255,255,0.9)"
  >New security · by 25 May</text>

  <!-- CTA pill -->
  <g>
    <rect x="106" y="150" width="84" height="32" rx="16" fill="#fbbf24" />
    <text
      x="148"
      y="172"
      text-anchor="middle"
      font-family="Helvetica, Arial, sans-serif"
      font-size="14"
      font-weight="900"
      fill="#1e1b4b"
      letter-spacing="0.5"
    >REGISTER</text>
  </g>
</svg>
