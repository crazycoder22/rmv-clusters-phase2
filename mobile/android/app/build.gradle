apply plugin: 'com.android.application'
apply plugin: 'com.github.triplet.play'
apply plugin: 'org.jetbrains.kotlin.android'

// Release signing config — reads from a gitignored keystore.properties
// file at the android/ root. If the file's missing (e.g. on a fresh
// clone, or in CI without secrets), release builds simply stay unsigned
// instead of breaking the whole gradle config.
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "in.rmvclustersphase2.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "in.rmvclustersphase2.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 22
        versionName "1.0.21"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (keystorePropertiesFile.exists()) {
            release {
                storeFile file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
            }
        }
    }
    buildTypes {
        release {
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    kotlinOptions {
        jvmTarget = "21"
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    // Health Connect — daily step reads for the always-on step tracker.
    implementation "androidx.health.connect:connect-client:1.1.0-alpha10"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

// ─── Gradle Play Publisher ────────────────────────────────────────────────
// Uploads the release AAB straight to Play Console from the CLI. To use:
//   1. Drop a service-account JSON at android/play-publisher-credentials.json
//      (gitignored). See README / setup notes in the chat history.
//   2. Run: ./gradlew publishReleaseBundle
// The plugin is configured to target the internal-testing track by default,
// and to NOT publish a release if no credentials file exists yet — keeps
// fresh clones / CI without secrets from blowing up.
def playCredsFile = rootProject.file("play-publisher-credentials.json")
if (playCredsFile.exists()) {
    play {
        serviceAccountCredentials.set(playCredsFile)
        track.set("internal")
        defaultToAppBundles.set(true)
        // Auto-publish to internal testing as soon as the AAB lands —
        // internal testers see the update without an extra manual step
        // in Play Console. The track is "internal" only, so this never
        // touches production. Flip back to DRAFT if you ever want a
        // human review step before rollout.
        releaseStatus.set(com.github.triplet.gradle.androidpublisher.ReleaseStatus.COMPLETED)
    }
} else {
    logger.lifecycle(
        "play-publisher-credentials.json not found at android/ root — " +
        "Gradle Play Publisher disabled. CLI uploads via ./gradlew " +
        "publishReleaseBundle will be no-ops until the file is added."
    )
}
